<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Sign Up</title>

        <!-- Custom styles for this template -->
        <link href="contact.css" rel="stylesheet">
    </head>
    
    <body>
        <form class = "signup-form" method="post" action="/">
            <img class="" src="images/logo/logo-nb.png" alt="" width="250" height="250">
            <h1 class="">Contact us for more details and pricing!</h1>
            <div class = "data-input">

                <div class="top-box">
                    <label for="fname">First name</label>
                    <input type="text" class="top-input" name="fname" placeholder="First Name..." required autofocus>
                </div>

                <div class="mid-box">
                    <label for="lname">Last name</label>
                    <input type="text" name="lname" placeholder="Last Name..." required>
                </div>

                <div class="bot-box">
                    <label for="floatingInput">Email address</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <button class="submit-btn" type="submit">Submit</button>
            </div>

            <p class="copyright">© InDetail Photography 2022–2023</p>
            
        </form>
    </body>
</html>
