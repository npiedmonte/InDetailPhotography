    <body>
        <div class="wrapper">

            <header>
                <nav>

                    <li><a class="mini-sess" href="themed.html">Seasonal Themed Shoots</a></li>

            <form class = "signup-form" method="post" action="/">
                <img src="images/logo/logo-nb.png" alt="" width="250" height="250">
                <h2>Contact us for details and pricing!</h2>
                <div class = "data-input">

                    <div class="top-box">
                        <label for="fname">First name</label>
                        <input type="text" class="top-input" name="fname" placeholder="First Name..." required autofocus>
                    </div>

                    <div class="mid-box">
                        <label for="lname">Last name</label>
                        <input type="text" name="lname" placeholder="Last Name..." required>
                    </div>

                    <div class="bot-box">
                        <label for="floatingInput">Email</label>
                        <input type="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <button class="submit-btn" type="submit">Submit</button>
                </div>
                
            </form>

            <footer class="social-section" id="footer">
                <div class="social-links">
